name: Update Rowing CSV

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Google Sheet CSV
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1b7Zx9cwCDXWkeYhGB91YhoMrtWWd1AiTyEbqYEcgGDI/gviz/tq?tqx=out:csv&sheet=RowingLog" -o rowing_log.csv

      - name: Commit updated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add rowing_log.csv
          git commit -m "Daily data update" || echo "No changes"
          git push
